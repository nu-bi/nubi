    <!-- ── No-FOUC theme script ─────────────────────────────────────────────
         Runs synchronously before any paint. Reads localStorage then
         prefers-color-scheme to set the initial `dark` class on <html>
         before CSS or React load, preventing flash of wrong theme.
    ──────────────────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        try {
          var qp = new URLSearchParams(location.search).get('theme');
          if (qp === 'dark' || qp === 'light') { localStorage.setItem('nubi-theme', qp); }
          var stored = localStorage.getItem('nubi-theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (stored === 'light') {
            document.documentElement.classList.remove('dark');
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage may be blocked (private mode, permissions policy) — fail silently
        }
      })();
    </script>
