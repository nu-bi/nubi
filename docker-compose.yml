networks:
  nubi:
    driver: bridge

volumes:
  pg_data:
  minio_data:

services:
  # ── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     nubi
      POSTGRES_PASSWORD: nubi
      POSTGRES_DB:       nubi
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - nubi
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U nubi -d nubi"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 10s

  # ── Object Storage (MinIO — S3-compatible) ──────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    networks:
      - nubi
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    healthcheck:
      test:         ["CMD", "mc", "ready", "local"]
      interval:     5s
      timeout:      5s
      retries:      12
      start_period: 10s

  # One-shot init container: waits for MinIO, then creates the 'nubi' bucket.
  minio-init:
    image: quay.io/minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - nubi
    environment:
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/nubi &&
        echo 'Bucket nubi is ready.'
      "

  # ── Backend (FastAPI / uvicorn) ──────────────────────────────────────────
  # OSS community image — backend/app/ee/ is excluded (see backend/Dockerfile
  # and .dockerignore).  Commercial features require a separate EE image.
  backend:
    build:
      context:    .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.compose
    environment:
      # Override DATABASE_URL so the backend always connects to the compose db.
      DATABASE_URL: postgresql://nubi:nubi@db:5432/nubi
      # MinIO / S3-compatible object storage (internal compose hostname).
      S3_ENDPOINT_URL:  "http://minio:9000"
      S3_ACCESS_KEY:    "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY:    "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_REGION:        "${S3_REGION:-us-east-1}"
      S3_BUCKET:        "${S3_BUCKET:-nubi}"
      S3_FORCE_PATH_STYLE: "true"
    networks:
      - nubi
    # The backend is NOT published directly; nginx proxies /api → backend:8000.
    expose:
      - "8000"

  # ── Frontend (nginx + Vite SPA) ──────────────────────────────────────────
  # OSS community image — src/ee/ is excluded (see frontend/Dockerfile and
  # .dockerignore).  nginx proxies /api and /health to the backend service.
  frontend:
    build:
      context:    .
      dockerfile: frontend/Dockerfile
      args:
        # Empty = same-origin: the SPA calls /api on the same host/port it is
        # served from (nginx proxies it to the backend).  Override for split-
        # host deployments (e.g. VITE_BACKEND_URL=https://api.example.com).
        VITE_BACKEND_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - nubi
    ports:
      - "8080:80"
