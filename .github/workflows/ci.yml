name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Backend — in-memory suite (no live Postgres, runs on every push/PR)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: cd backend && ruff check app/

      - name: Test (in-memory suite)
        run: cd backend && python -m pytest -q

  # ---------------------------------------------------------------------------
  # Backend PG — migrations + real-Postgres integration + security tests
  # ---------------------------------------------------------------------------
  backend-pg:
    name: Backend PG (Python 3.13 + Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nubi
          POSTGRES_PASSWORD: nubi
          POSTGRES_DB: nubi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nubi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://nubi:nubi@localhost:5432/nubi_test"
      RUN_PG_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python database/migrate.py

      - name: Seed demo data
        # Guard: seed_demo.py is optional — missing file is not a hard failure.
        run: |
          if [ -f backend/seed_demo.py ]; then
            cd backend && python seed_demo.py
          else
            echo "seed_demo.py not found — skipping seed step"
          fi

      - name: Test (PG integration + security)
        run: |
          cd backend && python -m pytest tests/test_pg_integration.py tests/security -q

  # ---------------------------------------------------------------------------
  # MCP (unchanged from previous ci.yml)
  # ---------------------------------------------------------------------------
  mcp:
    name: MCP (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: mcp/requirements.txt

      - name: Install dependencies
        run: pip install -r mcp/requirements.txt

      - name: Test
        run: cd mcp && python -m pytest -q

  # ---------------------------------------------------------------------------
  # CLI (unchanged from previous ci.yml)
  # ---------------------------------------------------------------------------
  cli:
    name: CLI (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: cli/requirements.txt

      - name: Install dependencies
        run: pip install -r cli/requirements.txt pytest

      - name: Test
        run: cd cli && python -m pytest tests -q

  # ---------------------------------------------------------------------------
  # Frontend — unit tests + all builds
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:dash

      - name: Build (app)
        run: npm run build

      - name: Build embed
        run: npm run build:embed

      - name: Build widgets
        run: npm run build:widgets

  # ---------------------------------------------------------------------------
  # SDK (unchanged from previous ci.yml)
  # ---------------------------------------------------------------------------
  sdk:
    name: SDK (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install, build, and test
        run: cd sdk && npm ci && npm run build && npm test

  # ---------------------------------------------------------------------------
  # E2E — allow-failure until the suite is stable
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright / Chromium)
    runs-on: ubuntu-latest
    continue-on-error: true   # allow-failure: suite still being built out
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: bash scripts/e2e.sh
