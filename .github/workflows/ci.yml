name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff

      - name: Lint (ruff)
        run: cd backend && ruff check app/

      - name: Test
        run: cd backend && python -m pytest -q

  mcp:
    name: MCP (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mcp/requirements.txt

      - name: Install dependencies
        run: pip install -r mcp/requirements.txt

      - name: Test
        run: cd mcp && python -m pytest -q

  cli:
    name: CLI (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cli/requirements.txt

      - name: Install dependencies
        run: pip install -r cli/requirements.txt pytest

      - name: Test
        run: cd cli && python -m pytest tests -q

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build embed
        run: npm run build:embed

      - name: Build widgets
        run: npm run build:widgets

      - name: Test
        run: npm run test:dash

  sdk:
    name: SDK (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install, build, and test
        run: cd sdk && npm ci && npm run build && npm test
