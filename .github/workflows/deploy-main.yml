name: Deploy to Production (Fly.io)
on:
  push:
    branches:
      - main

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: fly-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Builds the combined image (root Dockerfile: SPA + backend) on Fly's
      # remote builders and rolls out both processes (app + worker).
      # Migrations run via the release_command in fly.toml.
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
