# Nubi nginx configuration — serves the Vite SPA and proxies /api to backend.
# The "backend" upstream refers to the "backend" service in docker-compose.yml.

upstream nubi_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Serve the built SPA from the standard nginx html root.
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    # Forward /api/* and /health to the backend container.
    # The backend also accepts /docs, /redoc, /openapi.json for local use.
    location /api/ {
        proxy_pass         http://nubi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large request bodies (e.g. file uploads, Arrow blobs).
        client_max_body_size 64m;
        proxy_read_timeout   120s;
    }

    location = /health {
        proxy_pass         http://nubi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /docs {
        proxy_pass         http://nubi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /redoc {
        proxy_pass         http://nubi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /openapi.json {
        proxy_pass         http://nubi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Serve static assets directly; fall back to index.html for client-side
    # routes so that deep-links and refreshes work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively; everything else no-cache.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip for text assets.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;
}
